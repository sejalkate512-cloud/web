<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
            
         .product{
            background-color: aqua;
            height: 500px;
            display: flex;
            /* Flex Bydefault Gives you the row format */

            align-items: center;


         }

            width: 100px;

            font-weight: bold;
            background-color: beige;
        }

</head>
<body>
    <div class="product">
        
        <div class="box">Cake </div>
        <div class="box">Cookie </div>
        <div class="box">Pastry </div>



    </div>
</body>
