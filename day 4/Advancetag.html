<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--DATA LIST Tag -->
    <label>Food</label>
    <input list="food">

    <datalist id="food">
    
    
    <option value="Pizza">
    <option value="Burger">
    <option value="Fries">
    <option value="Coke">   
    <option value="beverage">

    </datalist>

     <label>Location</label>
    <input list="city">
    <datalist id="city">

    <option value="mumbai">
    <option value="Bangalore">
    <option value="chennai">
    <option value="Delhi">   
    <option value="hyderabad">

    </datalist>

</body>
</html>
