<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       // Data Types - Different Types of Data(Information)

       //1. String - "Anything between quotes"  or 'Text' - Simple form of Text

       var city = "Mumbai"

       console.log(city)

       console.log("The City Name is " , city)

      //   typeof(Value) - Method which help us to check Data Type

      console.log( typeof(city)    )

      var password = "1234"

      console.log( typeof(password)  )


      // 2. Number - -ve , decimal , whole Number
      var age = 32

      var height = 5.9

      var temp = -2.00

      console.log(typeof(age))
      console.log(typeof(height))
      console.log(typeof(temp))


      //3 . Boolean - true or false

      var IsLoggedin = true

      var CanWatchVideo = false

      var NetflixSubscribe = "true"  //It is in double quotes

      console.log(typeof(CanWatchVideo))

      console.log(typeof(NetflixSubscribe))



      //Undefined - Value is Not assigned

      var x

      console.log( typeof(x) )


      //Null - Nothing

      var discount = null

      console.log(typeof(discount))

      //There is Bug in Js - null data type output is object











    </script>
</body>
</html>
