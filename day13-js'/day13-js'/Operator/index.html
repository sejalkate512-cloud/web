<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    

    <script>
         //Operators

         //1. Arthmetic Operator -  + , - , / , * , %

         var x = 10

         var y = 7
 
         console.log(x+y)   //17
         console.log(x-y)  //3
         console.log(x/y)  //1.something
         console.log(x*y)  //70
 
         console.log(x%y)   //3


         //2. Asignment  = Value to be assigned
         
         var a = 10

         console.log(a+=5)
         console.log(a-=5)
         console.log(a/=5)
         console.log(a*=5)



         //3. Comapriosn Operator - < , > , <= , >= , == ,===
         //Ouput - Boolean Type : true or false

         var p = 20
         var q = 15

         console.log(p < q) //False

         console.log(p > q)  //True

         var b = 25
         var c = 25

         console.log(b <= c)  //True

         console.log(b >= c)  //True

         var height1 = 172

         var height2 = "172"
            
        // == It Will Only Checks The Value Left Value == Right Value Are Same True 

         console.log(height1 == height2)  //True

         
         // === It WIll CHECK DATA TYPE AND VALUE AS WELL 

          console.log(height1 === height2)  //False


         










    </script>
</body>
