<body>
    <script>
        //Logical Operator - AND , OR , Not

        //1. AND - && : BOTH CONDITION IS TRUE THEN OUTPUT IS TRUE

        var isMember = false

        var TotalBill = 1500

        console.log(" Discount Applicable -" , isMember  && TotalBill > 1000  )


        var FirstTimeUser = true

        var Bill = 500

        console.log("First Time Discount Unlocked " , FirstTimeUser && Bill >= 500 )


        //OR ||  : Even IF One Condition is True Then OutPut is True

        var Loggedin = true

        var canWatchVideo = false

        console.log(Loggedin || canWatchVideo)


        //Not ! : Oppostie Value

        let NextflixSubs = false

        console.log("The Status"  ,  !NextflixSubs)




    </script>
