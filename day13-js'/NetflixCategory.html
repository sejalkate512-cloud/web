<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 <style>
     body{
        font-family: Arial;
        padding: 20px;
     }

     header{
        display: flex;
        justify-content:space-between;
        align-items: center;
        padding: 20px;

        border: 2px solid black;

     }


     nav a{
        display: inline;
        text-decoration: none;
        color: black;
        padding: 8px;
        margin-left: 15px;
     }

     nav a:hover{
        background: black;
        color: white;
        transform: 0.5s;
     }

     .categories{
        display: flex;
        gap: 15px;
        margin-top: 20px;
     }

    .category{
        border: 1px solid black;
        padding: 15px;
    }

    .category:hover{
        background-color: black;
        color: white;
        transition: 2s;
    }



    .movies{
        display: grid;
        grid-template-columns: repeat(3,1fr);
        gap: 20px;
        margin-top: 30px;

    }

    .movie-card{
            border: 2px solid black;
            padding: 40px;
            text-align: center;

        }


        .movie-card:hover{
            transform: scale(1.05);
            transition: 2s;
        }

 </style>

</head>
<body>
    <!-- Netflix Movie Categories Layout -->
   
    <header>
        <h1>Movie Zone</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Movies</a>
            <a href="#">Series</a>
            <a href="#">MyList</a>
        </nav>
    </header>


    <section class="categories">
     
        <div class="category">Action</div>
        <div class="category">Comdey</div>
        <div class="category">Horror</div>
        <div class="category">Drama</div>


    </section>

    <section class="movies">

        <div class="movie-card">
            <h3>Avengers</h3>
        </div>

         <div class="movie-card">
            <h3>One Piece</h3>
        </div>

         <div class="movie-card">
            <h3>Batman</h3>
        </div>


         <div class="movie-card">
            <h3>Titanic</h3>
        </div>

         <div class="movie-card">
            <h3>KGF 2</h3>
        </div>

         <div class="movie-card">
            <h3>Dhurandhar</h3>
         </div>
        

    </section>

</body>
</html>
