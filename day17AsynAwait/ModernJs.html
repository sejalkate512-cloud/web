<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Template String - Varibale or parameter along with Text

        var a = "John"

         //Old Way
        console.log("My Name is " , a)

        //New Way- ${variableName/Paramter}
        console.log(` My Name is ${a}  `)


        //Arrow Function - Function Logic in one line

        //old way - function

        function xyz(){
            console.log("Hello I am Old Function")
        }
        xyz()

       //New Way 

     var abc =  ()=>{
        console.log("Hello I am Arrow Function")
       }

       abc()



    </script>
</body>
</html>
