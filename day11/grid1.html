<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .products{
            display: grid;
            /* grid-template-columns: repeat(No of Column - Maximum No is 12 , Size of Each Column); */
            /* grid-template-columns: repeat(3,1fr); */

              
            grid-template-columns: repeat(auto-fit , minmax(200px , 1fr));
            background-color: skyblue;  
            padding: 20px;
            gap: 25px;

        }


        .box{
            border: 1px solid black;
            background-color: palegreen;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="products">
          
        <div class="box">Cake</div>
        <div class="box">Price:$25</div>
        <div class="box">Cookie</div>
        <div class="box">Price :$15</div>
        <div class="box">Pastry:</div>
        <div class="box">Price $20</div>


    </div>
</body>
</html>
