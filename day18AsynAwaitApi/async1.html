<!DOCTYPE html>

<body>

    <script>
      
    // Api - http://www.omdbapi.com/?t=MovieName&apikey=a6606658
    
    
 async  function getMovie(movieName){
        

        let url = `http://www.omdbapi.com/?t=${movieName}&apikey=a6606658`

        try{

            //Getting Data From API

            let response  =    await     fetch(url)

            let data      =    await     response.json()

       //     console.log(data)

            if(data.Response == "True"){
                console.log(`Title   ${data.Title} `)
                console.log(`Year :  ${data.Year}`)
                console.log(`Plot : ${data.Plot}`)
                console.log(`Poster/Image  :  ${data.Poster}`)
            }else{
                console.log("Movie Not found")
            }


        }catch(error){
              console.log("Error Fetching Movie" , error)
        }
        

    }
    getMovie("Avengers")
    
    function ExtraTask(){
        console.log("Hello Guys Welcome To Js")
    }
    ExtraTask()
    
    
    </script>
</body>
